version: 0.1
log:
  level: info
  fields:
    service: registry
storage:
  filesystem:
    # Must match the volume/bind-mount target. In production this directory
    # lives on the Hetzner storage box mounted as a local filesystem.
    rootdirectory: /var/lib/registry
  delete:
    enabled: true
  cache:
    blobdescriptor: inmemory
  maintenance:
    # Purge stale, never-finalized blob uploads (interrupted pushes).
    uploadpurging:
      enabled: true
      age: 168h
      interval: 24h
      dryrun: false
http:
  addr: :5000
  headers:
    X-Content-Type-Options: [nosniff]
health:
  storagedriver:
    enabled: true
    interval: 10s
    threshold: 3
