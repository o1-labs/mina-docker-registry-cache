name: release

# Build the janitor image and publish it to GitHub Container Registry (GHCR)
# when a version tag is pushed (e.g. v1.2.3). The registry itself is stock
# registry:2.8.3 and is not republished — only the custom janitor is.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Gate on tests before publishing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: janitor
      - name: Unit tests
        working-directory: janitor
        run: cargo test --locked
      - name: Integration test
        run: ./tests/integration.sh

  build-push:
    name: Build + push janitor image to GHCR
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          # -> ghcr.io/o1-labs/mina-docker-registry-cache/janitor
          images: ghcr.io/${{ github.repository }}/janitor
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./janitor
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
